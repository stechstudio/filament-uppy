name: Tests

on:
  push:
    paths:
      - '**.php'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            filament: '^3.0'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.4'
            filament: '^3.0'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.5'
            filament: '^3.0'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.3'
            filament: '^4.0'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.4'
            filament: '^4.0'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.5'
            filament: '^4.0'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.3'
            filament: '^5.0'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.4'
            filament: '^5.0'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.5'
            filament: '^5.0'
            laravel: '12.*'
            testbench: '10.*'

    name: PHP ${{ matrix.php }} - Filament ${{ matrix.filament }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom
          coverage: none

      - name: Install dependencies
        run: |
          composer require "filament/filament:${{ matrix.filament }}" "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer require "pestphp/pest-plugin-laravel:^3.0" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest --ci
